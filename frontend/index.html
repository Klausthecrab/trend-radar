<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend-Radar</title>
<style>
  :root {
    --bg: #0a0a12;
    --card: rgba(255,255,255,0.035);
    --card-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #7c3aed;
    --cyan: #06b6d4;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 50%);
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.25rem;
  }
  .header p {
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  /* Tab Navigation */
  .tabs {
    display: flex;
    gap: 0.25rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.25rem;
    margin-bottom: 1.5rem;
  }
  .tab-btn {
    flex: 1;
    padding: 0.7rem 1rem;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); background: var(--card-hover); }
  .tab-btn.active {
    color: #fff;
    background: rgba(124,58,237,0.25);
    box-shadow: 0 0 12px rgba(124,58,237,0.15);
  }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Status Cards */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
  }
  .stat-card .value {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  .stat-card .label {
    color: var(--text-dim);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat-card .status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 0.5rem;
    animation: pulse 2s ease-in-out infinite;
  }
  .stat-card .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .stat-card .status-dot.offline { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Entry List */
  .entry-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    transition: all 0.2s;
  }
  .entry-card:hover { background: var(--card-hover); }
  .entry-card .meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .entry-card .source-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .source-badge.reddit { background: rgba(255,69,0,0.2); color: #ff4500; }
  .source-badge.youtube { background: rgba(255,0,0,0.2); color: #ff0000; }
  .source-badge.rss { background: rgba(255,165,0,0.2); color: #ffa500; }
  .source-badge.web { background: rgba(6,182,212,0.2); color: var(--cyan); }
  .entry-card .title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    cursor: pointer;
  }
  .entry-card .title:hover { color: var(--cyan); }
  .entry-card .summary {
    color: var(--text-dim);
    font-size: 0.85rem;
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }
  .entry-card .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
  }
  .entry-card .status-badge {
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
  }
  .status-badge.unread { background: rgba(34,197,94,0.2); color: var(--green); }
  .status-badge.read { background: rgba(100,100,100,0.2); color: var(--text-dim); }
  .status-badge.discussed { background: rgba(124,58,237,0.2); color: var(--accent); }
  .status-badge.processing { background: rgba(6,182,212,0.2); color: var(--cyan); animation: pulse 1.5s ease-in-out infinite; }

  .entry-card .relevance {
    display: inline-block;
    font-size: 0.8rem;
    color: var(--orange);
  }

  /* Dump Form */
  .dump-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    max-width: 600px;
    margin: 0 auto;
  }
  .dump-form label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
    margin-top: 1rem;
  }
  .dump-form label:first-child { margin-top: 0; }
  .dump-form input, .dump-form select {
    width: 100%;
    padding: 0.7rem;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .dump-form input:focus, .dump-form select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(124,58,237,0.15);
  }
  .dump-form button {
    margin-top: 1.25rem;
    width: 100%;
    padding: 0.75rem;
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .dump-form button:hover { opacity: 0.9; }
  .dump-form button:disabled { opacity: 0.5; cursor: not-allowed; }
  .dump-feedback {
    margin-top: 1rem;
    padding: 0.75rem;
    border-radius: 8px;
    display: none;
  }
  .dump-feedback.success { display: block; background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .dump-feedback.error { display: block; background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

  /* Controls */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .controls .filter select {
    padding: 0.4rem 0.75rem;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
  }
  .controls .last-updated {
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
  }

  @media (max-width: 640px) {
    .container { padding: 1rem; }
    .header h1 { font-size: 1.5rem; }
    .tabs { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📡 Trend-Radar</h1>
    <p>Nach vorne statt nach hinten — Trends erkennen, bevor sie Standard sind</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tabStatus" onclick="switchTab('status')">📊 Status</button>
    <button class="tab-btn" id="tabEntries" onclick="switchTab('entries')">📋 Einträge</button>
    <button class="tab-btn" id="tabDump" onclick="switchTab('dump')">📥 Dump</button>
  </div>

  <!-- Status Panel -->
  <div class="panel active" id="panelStatus">
    <div class="status-grid" id="statusGrid">
      <div class="stat-card">
        <div><span class="status-dot online" id="healthDot"></span></div>
        <div class="value" id="healthStatus">—</div>
        <div class="label">Server-Status</div>
      </div>
      <div class="stat-card">
        <div class="value" id="totalEntries">—</div>
        <div class="label">Gesamt Einträge</div>
      </div>
      <div class="stat-card">
        <div class="value" id="unreadEntries">—</div>
        <div class="label">Ungelesen</div>
      </div>
      <div class="stat-card">
        <div class="value" id="lastScan">—</div>
        <div class="label">Letzter Scan</div>
      </div>
    </div>
  </div>

  <!-- Entries Panel -->
  <div class="panel" id="panelEntries">
    <div class="controls">
      <div class="filter">
        <select id="statusFilter" onchange="loadEntries()">
          <option value="">Alle Status</option>
          <option value="unread">Ungelesen</option>
          <option value="read">Gelesen</option>
          <option value="discussed">Diskutiert</option>
        </select>
        <select id="sourceFilter" onchange="loadEntries()">
          <option value="">Alle Quellen</option>
          <option value="reddit">Reddit</option>
          <option value="youtube">YouTube</option>
          <option value="rss">RSS/Feed</option>
          <option value="web">Web</option>
        </select>
      </div>
      <div class="last-updated" id="entriesUpdated"></div>
    </div>
    <div class="entry-list" id="entryList">
      <div class="empty-state">Lade Einträge …</div>
    </div>
  </div>

  <!-- Dump Panel -->
  <div class="panel" id="panelDump">
    <div class="dump-form">
      <label>Quell-Typ</label>
      <select id="dumpType">
        <option value="youtube">🎬 YouTube</option>
        <option value="reddit">🗨️ Reddit</option>
        <option value="web">🌐 Web/URL</option>
      </select>
      <label>URL / Link</label>
      <input type="url" id="dumpUrl" placeholder="https://youtube.com/watch?v=... oder Reddit-URL">
      <label>Titel (optional)</label>
      <input type="text" id="dumpTitle" placeholder="z.B. Video-Titel oder Artikel-Überschrift">
      <button id="dumpBtn" onclick="submitDump()">📥 Einsenden</button>
      <div id="dumpFeedback" class="dump-feedback"></div>
    </div>
  </div>
</div>

<script>
const API = '';

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  if (tab === 'status') loadStatus();
  if (tab === 'entries') loadEntries();
}

// --- Status ---
async function loadStatus() {
  try {
    const res = await fetch(API + '/api/health');
    const health = await res.json();
    document.getElementById('healthDot').className = 'status-dot online';
    document.getElementById('healthStatus').textContent = 'Online';
  } catch {
    document.getElementById('healthDot').className = 'status-dot offline';
    document.getElementById('healthStatus').textContent = 'Offline';
  }
  try {
    const res = await fetch(API + '/api/scan/status');
    const status = await res.json();
    document.getElementById('totalEntries').textContent = status.total_entries ?? '—';
    document.getElementById('unreadEntries').textContent = status.unread_entries ?? '—';
    document.getElementById('lastScan').textContent = status.last_scan
      ? new Date(status.last_scan).toLocaleDateString('de-DE')
      : 'Nie';
  } catch {}
}

// --- Entries ---
async function loadEntries() {
  const container = document.getElementById('entryList');
  const statusFilter = document.getElementById('statusFilter').value;
  const sourceFilter = document.getElementById('sourceFilter').value;
  let url = API + '/api/entries?limit=50';
  if (statusFilter) url += '&status=' + statusFilter;
  if (sourceFilter) url += '&source=' + sourceFilter;

  try {
    const res = await fetch(url);
    const entries = await res.json();
    document.getElementById('entriesUpdated').textContent =
      'Zuletzt aktualisiert: ' + new Date().toLocaleTimeString('de-DE');

    if (!entries.length) {
      container.innerHTML = '<div class="empty-state">Keine Einträge gefunden</div>';
      return;
    }

    container.innerHTML = entries.map(e => {
      const analysis = e.analysis || {};
      const relevance = analysis.relevance ? '⭐'.repeat(analysis.relevance) : '';
      const tookaways = analysis.takeaways && analysis.takeaways.length
        ? analysis.takeaways.slice(0, 2).join(' · ')
        : '';

      return `<div class="entry-card">
        <div class="meta">
          <span class="source-badge ${e.source_type}">${e.source_type}</span>
          <span>${e.author || 'Unbekannt'}</span>
          <span>${e.published_at ? new Date(e.published_at).toLocaleDateString('de-DE') : ''}</span>
        </div>
        <div class="title" onclick="window.open('${e.url}', '_blank')">${e.title || 'Kein Titel'}</div>
        <div class="summary">${e.content ? e.content.slice(0, 200) + (e.content.length > 200 ? '…' : '') : ''}</div>
        ${tookaways ? '<div class="summary" style="color: var(--cyan); font-size: 0.8rem;">💡 ' + tookaways + '</div>' : ''}
        <div class="footer">
          <div>
            <span class="status-badge ${e.status}">${e.status}</span>
            ${relevance ? '<span class="relevance">' + relevance + '</span>' : ''}
          </div>
          <span style="color: var(--text-dim); font-size: 0.75rem;">${new Date(e.created_at).toLocaleString('de-DE')}</span>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    container.innerHTML = '<div class="empty-state">⚠️ Fehler: ' + err.message + '</div>';
  }
}

// --- Dump ---
async function submitDump() {
  const btn = document.getElementById('dumpBtn');
  const url = document.getElementById('dumpUrl').value.trim();
  const type = document.getElementById('dumpType').value;
  const title = document.getElementById('dumpTitle').value.trim();
  const feedback = document.getElementById('dumpFeedback');

  if (!url) {
    feedback.className = 'dump-feedback error';
    feedback.textContent = '⚠️ Bitte gib eine URL ein.';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Wird verarbeitet …';

  try {
    const res = await fetch(API + '/api/entries', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, source_type: type, title })
    });
    const data = await res.json();
    if (res.ok) {
      feedback.className = 'dump-feedback success';
      feedback.textContent = data.message === 'Eintrag existiert bereits'
        ? 'ℹ️ Dieser Eintrag ist bereits vorhanden.'
        : '✅ Eintrag erfolgreich eingesendet! (ID: ' + (data.id || '') + ')';
      document.getElementById('dumpUrl').value = '';
      document.getElementById('dumpTitle').value = '';
    } else {
      feedback.className = 'dump-feedback error';
      feedback.textContent = '⚠️ ' + (data.error || 'Unbekannter Fehler');
    }
  } catch (err) {
    feedback.className = 'dump-feedback error';
    feedback.textContent = '⚠️ Netzwerkfehler: ' + err.message;
  }

  btn.disabled = false;
  btn.textContent = '📥 Einsenden';
}

// Auto-refresh
let refreshInterval;
function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    const active = document.querySelector('.panel.active');
    if (active && active.id === 'panelStatus') loadStatus();
    if (active && active.id === 'panelEntries') loadEntries();
  }, 30000);
}

// Init
loadStatus();
startAutoRefresh();
</script>
</body>
</html>
