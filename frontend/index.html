<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend-Radar</title>
<style>
  :root {
    --bg: #0a0a12;
    --card: rgba(255,255,255,0.035);
    --card-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #7c3aed;
    --cyan: #06b6d4;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 50%);
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.25rem;
  }
  .header p {
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  /* Tab Navigation */
  .tabs {
    display: flex;
    gap: 0.25rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.25rem;
    margin-bottom: 1.5rem;
  }
  .tab-btn {
    flex: 1;
    padding: 0.7rem 1rem;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); background: var(--card-hover); }
  .tab-btn.active {
    color: #fff;
    background: rgba(124,58,237,0.25);
    box-shadow: 0 0 12px rgba(124,58,237,0.15);
  }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Status Cards */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    text-align: center;
  }
  .stat-card .value {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  .stat-card .label {
    color: var(--text-dim);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat-card .status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 0.5rem;
    animation: pulse 2s ease-in-out infinite;
  }
  .stat-card .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .stat-card .status-dot.offline { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Entry List */
  .entry-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    transition: all 0.2s;
  }
  .entry-card:hover { background: var(--card-hover); }
  .entry-card .meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .entry-card .source-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .source-badge.reddit { background: rgba(255,69,0,0.2); color: #ff4500; }
  .source-badge.youtube { background: rgba(255,0,0,0.2); color: #ff0000; }
  .source-badge.rss { background: rgba(255,165,0,0.2); color: #ffa500; }
  .source-badge.web { background: rgba(6,182,212,0.2); color: var(--cyan); }
  .entry-card .title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    cursor: pointer;
  }
  .entry-card .title:hover { color: var(--cyan); }
  .entry-card .summary {
    color: var(--text-dim);
    font-size: 0.85rem;
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }
  .entry-card .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
  }
  .entry-card .status-badge {
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
  }
  .status-badge.unread { background: rgba(34,197,94,0.2); color: var(--green); }
  .status-badge.read { background: rgba(100,100,100,0.2); color: var(--text-dim); }
  .status-badge.discussed { background: rgba(124,58,237,0.2); color: var(--accent); }
  .status-badge.processing { background: rgba(6,182,212,0.2); color: var(--cyan); animation: pulse 1.5s ease-in-out infinite; }

  .entry-card .relevance {
    display: inline-block;
    font-size: 0.8rem;
    color: var(--orange);
  }

  /* Dump Form */
  .dump-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    max-width: 600px;
    margin: 0 auto;
  }
  .dump-form label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
    margin-top: 1rem;
  }
  .dump-form label:first-child { margin-top: 0; }
  .dump-form input, .dump-form select {
    width: 100%;
    padding: 0.7rem;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .dump-form input:focus, .dump-form select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(124,58,237,0.15);
  }
  .dump-form button {
    margin-top: 1.25rem;
    width: 100%;
    padding: 0.75rem;
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .dump-form button:hover { opacity: 0.9; }
  .dump-form button:disabled { opacity: 0.5; cursor: not-allowed; }
  .dump-feedback {
    margin-top: 1rem;
    padding: 0.75rem;
    border-radius: 8px;
    display: none;
  }
  .dump-feedback.success { display: block; background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .dump-feedback.error { display: block; background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .option-hint {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 1rem;
    padding: 0.5rem 0.75rem;
    background: rgba(124,58,237,0.08);
    border-radius: 6px;
    border: 1px solid rgba(124,58,237,0.15);
  }
  .optional { color: var(--text-dim); font-weight: 400; font-style: italic; }
  .dump-form textarea {
    width: 100%;
    padding: 0.7rem;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .dump-form textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(124,58,237,0.15);
  }
  .dump-results { margin-top: 1rem; display: none; }
  .dump-results.show { display: block; }
  .dump-result-item {
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    font-size: 0.8rem;
    margin-bottom: 0.25rem;
  }
  .dump-result-item.success { background: rgba(34,197,94,0.1); color: var(--green); }
  .dump-result-item.error { background: rgba(239,68,68,0.1); color: var(--red); }
  .dump-result-item.duplicate { background: rgba(245,158,11,0.1); color: var(--orange); }

  /* Controls */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .controls .filter select {
    padding: 0.4rem 0.75rem;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
  }
  .controls .last-updated {
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
  }

  /* Sub-tabs */
  .sub-tabs {
    display: flex;
    gap: 0.25rem;
    margin-bottom: 1rem;
  }
  .sub-tab-btn {
    padding: 0.4rem 0.9rem;
    border: none;
    background: var(--card);
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .sub-tab-btn:hover { color: var(--text); background: var(--card-hover); }
  .sub-tab-btn.active {
    color: #fff;
    background: rgba(6,182,212,0.2);
    box-shadow: 0 0 8px rgba(6,182,212,0.1);
  }

  /* YouTube Gallery */
  .youtube-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .yt-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
  }
  .yt-card:hover {
    background: var(--card-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .yt-card .yt-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: rgba(0,0,0,0.3);
  }
  .yt-card .yt-info {
    padding: 0.75rem 1rem;
  }
  .yt-card .yt-title {
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 0.3rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .yt-card .yt-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    color: var(--text-dim);
  }
  .yt-card .yt-channel {
    color: var(--cyan);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    padding: 2rem 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #12121e;
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 800px;
    width: 100%;
    margin: auto;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.2s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
  }
  .modal-header h2 {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.4;
    margin: 0;
    flex: 1;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0.25rem;
    line-height: 1;
    border-radius: 6px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .modal-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .modal-body {
    padding: 1.25rem 1.5rem;
    overflow-y: auto;
    flex: 1;
  }
  .modal-body::-webkit-scrollbar { width: 6px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .modal-section {
    margin-bottom: 1.25rem;
  }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  .modal-section .content-text {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .modal-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.75rem;
  }
  .modal-topic {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.75rem;
  }
  .modal-topic:last-child { margin-bottom: 0; }
  .modal-topic h4 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 0.4rem;
    color: var(--cyan);
  }
  .modal-topic p {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  .modal-topic p:last-child { margin-bottom: 0; }
  .modal-topic .label {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .modal-footer {
    padding: 0.75rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .modal-footer a {
    color: var(--cyan);
    text-decoration: none;
    font-size: 0.85rem;
  }
  .modal-footer a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .container { padding: 1rem; }
    .header h1 { font-size: 1.5rem; }
    .tabs { flex-direction: column; }
    .modal-box { max-height: 90vh; border-radius: 10px; }
    .modal-header, .modal-body, .modal-footer { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📡 Trend-Radar</h1>
    <p>Nach vorne statt nach hinten — Trends erkennen, bevor sie Standard sind</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tabStatus" onclick="switchTab('status')">📊 Status</button>
    <button class="tab-btn" id="tabEntries" onclick="switchTab('entries')">📋 Einträge</button>
    <button class="tab-btn" id="tabDump" onclick="switchTab('dump')">📥 Dump</button>
    <button class="tab-btn" id="tabYoutube" onclick="switchTab('youtube')">🎬 YouTube-Log</button>
    <button class="tab-btn" id="tabSources" onclick="switchTab('sources')">📡 Quellen</button>
  </div>

  <!-- Status Panel -->
  <div class="panel active" id="panelStatus">
    <div class="status-grid" id="statusGrid">
      <div class="stat-card">
        <div><span class="status-dot online" id="healthDot"></span></div>
        <div class="value" id="healthStatus">—</div>
        <div class="label">Server-Status</div>
      </div>
      <div class="stat-card">
        <div class="value" id="totalEntries">—</div>
        <div class="label">Gesamt Einträge</div>
      </div>
      <div class="stat-card">
        <div class="value" id="unreadEntries">—</div>
        <div class="label">Ungelesen</div>
      </div>
      <div class="stat-card">
        <div class="value" id="lastScan">—</div>
        <div class="label">Letzter Scan</div>
      </div>
    </div>
  </div>

  <!-- Entries Panel -->
  <div class="panel" id="panelEntries">
    <div class="controls">
      <div class="filter">
        <select id="statusFilter" onchange="loadEntries()">
          <option value="">Alle Status</option>
          <option value="unread">Ungelesen</option>
          <option value="read">Gelesen</option>
          <option value="discussed">Diskutiert</option>
        </select>
        <select id="sourceFilter" onchange="loadEntries()">
          <option value="">Alle Quellen</option>
          <option value="reddit">Reddit</option>
          <option value="youtube">YouTube</option>
          <option value="rss">RSS/Feed</option>
          <option value="web">Web</option>
        </select>
      </div>
      <div class="last-updated" id="entriesUpdated"></div>
    </div>
    <div class="entry-list" id="entryList">
      <div class="empty-state">Lade Einträge …</div>
    </div>
  </div>

  <!-- Dump Panel -->
  <div class="panel" id="panelDump">
    <div class="dump-form">
      <div class="option-hint">Felder werden automatisch erkannt — nur die URL(s) sind Pflicht</div>
      <label>URLs <span class="optional">(eine pro Zeile)</span></label>
      <textarea id="dumpUrls" rows="4" placeholder="https://youtube.com/watch?v=...
https://reddit.com/r/selfhosted/...
https://example.com/blog/..."></textarea>
      <label>Quell-Typ <span class="optional">(optional)</span></label>
      <select id="dumpType">
        <option value="">🔍 Automatisch</option>
        <option value="youtube">🎬 YouTube</option>
        <option value="reddit">🗨️ Reddit</option>
        <option value="web">🌐 Web/URL</option>
      </select>
      <label>Titel <span class="optional">(optional)</span></label>
      <input type="text" id="dumpTitle" placeholder="Wird automatisch ermittelt">
      <button id="dumpBtn" onclick="submitDump()">📥 Einsenden</button>
      <div id="dumpFeedback" class="dump-feedback"></div>
      <div id="dumpResults" class="dump-results"></div>
    </div>
  </div>
</div>

<!-- YouTube-Log Panel -->
<div class="panel" id="panelYoutube">
  <div class="controls">
    <div class="last-updated" id="youtubeUpdated"></div>
  </div>
  <div class="youtube-gallery" id="youtubeGallery">
    <div class="empty-state">Lade YouTube-Einträge …</div>
  </div>
</div>

<!-- Quellen Panel -->
<div class="panel" id="panelSources">
  <div class="controls">
    <div class="filter">
      <button class="sub-tab-btn" onclick="triggerScan()" style="padding:0.4rem 1rem;">🔄 Jetzt scannen</button>
    </div>
    <div class="last-updated" id="sourcesUpdated"></div>
  </div>
  <div class="dump-form" style="max-width:100%;margin-bottom:1.5rem;">
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:0.75rem;align-items:end;">
      <div>
        <label>Quell-URL</label>
        <input type="text" id="sourceUrl" placeholder="https://reddit.com/r/selfhosted oder RSS-Feed-URL">
      </div>
      <div>
        <label>Typ</label>
        <select id="sourceType">
          <option value="subreddit">🗨️ Subreddit</option>
          <option value="rss">📰 RSS/Atom</option>
        </select>
      </div>
      <div>
        <label>Name</label>
        <input type="text" id="sourceName" placeholder="z.B. r/selfhosted">
      </div>
      <div>
        <button onclick="addSource()" style="margin-top:1.25rem;padding:0.6rem 1.2rem;background:linear-gradient(135deg,var(--accent),#6d28d9);border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;white-space:nowrap;">➕ Hinzufügen</button>
      </div>
    </div>
    <div id="sourceFeedback" class="dump-feedback"></div>
  </div>
  <div class="entry-list" id="sourceList">
    <div class="empty-state">Lade Quellen …</div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="closeDetail(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modalTitle">—</h2>
      <button class="modal-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="empty-state">Lade Details …</div>
    </div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
const API = '';

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  if (tab === 'status') loadStatus();
  if (tab === 'entries') loadEntries();
  if (tab === 'youtube') loadYoutubeGallery();
  if (tab === 'sources') loadSources();
}

// --- Status ---
async function loadStatus() {
  try {
    const res = await fetch(API + '/api/health');
    const health = await res.json();
    document.getElementById('healthDot').className = 'status-dot online';
    document.getElementById('healthStatus').textContent = 'Online';
  } catch {
    document.getElementById('healthDot').className = 'status-dot offline';
    document.getElementById('healthStatus').textContent = 'Offline';
  }
  try {
    const res = await fetch(API + '/api/scan/status');
    const status = await res.json();
    document.getElementById('totalEntries').textContent = status.total_entries ?? '—';
    document.getElementById('unreadEntries').textContent = status.unread_entries ?? '—';
    document.getElementById('lastScan').textContent = status.last_scan
      ? new Date(status.last_scan).toLocaleDateString('de-DE')
      : 'Nie';
  } catch {}
}

// --- Entries ---
const STEP_LABELS = {
  'queued': '⏳ Warte auf Start…',
  'extracting': '📋 Extrahiere Metadaten…',
  'downloading': '📥 Lade Audio herunter…',
  'transcribing': '🎤 Transkribiere Audio…',
  'analyzing': '🔍 Analysiere Inhalt…',
  'note': '📝 Erstelle Obsidian-Notiz…',
  'saving': '💾 Speichere…',
};

async function loadEntries() {
  const container = document.getElementById('entryList');
  const statusFilter = document.getElementById('statusFilter').value;
  const sourceFilter = document.getElementById('sourceFilter').value;
  let url = API + '/api/entries?limit=50';
  if (statusFilter) url += '&status=' + statusFilter;
  if (sourceFilter) url += '&source=' + sourceFilter;

  try {
    const res = await fetch(url);
    const entries = await res.json();
    document.getElementById('entriesUpdated').textContent =
      'Zuletzt aktualisiert: ' + new Date().toLocaleTimeString('de-DE');

    if (!entries.length) {
      container.innerHTML = '<div class="empty-state">Keine Einträge gefunden</div>';
      return;
    }

    const hasProcessing = entries.some(e => e.status === 'processing');

    container.innerHTML = entries.map(e => {
      const analysis = e.analysis || {};
      const relevance = analysis.relevance ? '⭐'.repeat(analysis.relevance) : '';
      const topics = analysis.topics && analysis.topics.length
        ? analysis.topics.slice(0, 2).map(t => t.name).join(' · ')
        : '';

      // Status badge
      let statusHtml = `<span class="status-badge ${e.status}">${e.status}</span>`;
      if (e.status === 'processing' && e.processing_step) {
        const label = STEP_LABELS[e.processing_step] || e.processing_step;
        statusHtml = `<span class="status-badge processing">🔄 ${label}</span>`;
      }

      return `<div class="entry-card">
        <div class="meta">
          <span class="source-badge ${e.source_type}">${e.source_type}</span>
          ${e.language ? `<span class="lang-badge" style="font-size:0.75rem;padding:0.05rem 0.4rem;border-radius:3px;background:rgba(6,182,212,0.15);color:var(--cyan);text-transform:uppercase;">${e.language}</span>` : ''}
          <span>${e.author || 'Unbekannt'}</span>
          <span>${e.published_at ? new Date(e.published_at).toLocaleDateString('de-DE') : ''}</span>
        </div>
        <div class="title" onclick="openDetail(${e.id})">${e.title || 'Kein Titel'}</div>
        <div class="summary">${e.content ? e.content.slice(0, 200) + (e.content.length > 200 ? '…' : '') : ''}</div>
        ${topics ? '<div class="summary" style="color: var(--cyan); font-size: 0.8rem;">💡 ' + topics + '</div>' : ''}
        <div class="footer">
          <div>
            ${statusHtml}
            ${relevance ? '<span class="relevance">' + relevance + '</span>' : ''}
            ${e.obsidian_note_path ? '<span style="margin-left:0.5rem;font-size:0.8rem;">📝 <a href="obsidian://open?vault=osb&file=' + encodeURIComponent(e.obsidian_note_path) + '" target="_blank" style="color:var(--cyan);">Obsidian</a></span>' : ''}
          </div>
          <span style="color: var(--text-dim); font-size: 0.75rem;">${new Date(e.created_at).toLocaleString('de-DE')}</span>
        </div>
      </div>`;
    }).join('');

    // Faster polling when entries are processing
    if (hasProcessing && (!refreshInterval || refreshInterval._id !== 'fast')) {
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(() => {
        const active = document.querySelector('.panel.active');
        if (active && active.id === 'panelStatus') loadStatus();
        if (active && active.id === 'panelEntries') loadEntries();
      }, 5000);
      refreshInterval._id = 'fast';
    } else if (!hasProcessing && refreshInterval && refreshInterval._id === 'fast') {
      clearInterval(refreshInterval);
      refreshInterval = null;
      startAutoRefresh();
    }
  } catch (err) {
    container.innerHTML = '<div class="empty-state">⚠️ Fehler: ' + err.message + '</div>';
  }
}

// --- Dump ---
async function submitDump() {
  const btn = document.getElementById('dumpBtn');
  const textarea = document.getElementById('dumpUrls');
  const type = document.getElementById('dumpType').value;
  const title = document.getElementById('dumpTitle').value.trim();
  const feedback = document.getElementById('dumpFeedback');
  const results = document.getElementById('dumpResults');

  // Split textarea into URLs, one per line, trim whitespace, filter empty
  const urls = textarea.value.split('\n').map(u => u.trim()).filter(u => u.length > 0);

  if (urls.length === 0) {
    feedback.className = 'dump-feedback error';
    feedback.textContent = '⚠️ Bitte gib mindestens eine URL ein.';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Verarbeite ' + urls.length + ' URL(s) …';
  feedback.className = '';
  feedback.textContent = '';
  results.className = 'dump-results show';
  results.innerHTML = '';

  let successCount = 0;
  let errorCount = 0;

  for (let i = 0; i < urls.length; i++) {
    const url = urls[i];
    const itemDiv = document.createElement('div');
    itemDiv.className = 'dump-result-item';
    itemDiv.textContent = `⏳ #${i + 1}: ${url.slice(0, 60)}${url.length > 60 ? '…' : ''}`;
    results.appendChild(itemDiv);

    try {
      const res = await fetch(API + '/api/entries', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, source_type: type || undefined, title: title || undefined })
      });
      const data = await res.json();

      if (res.ok) {
        if (data.message === 'Eintrag existiert bereits') {
          itemDiv.className = 'dump-result-item duplicate';
          itemDiv.textContent = `ℹ️ #${i + 1}: Bereits vorhanden — ${url.slice(0, 60)}${url.length > 60 ? '…' : ''}`;
        } else {
          itemDiv.className = 'dump-result-item success';
          itemDiv.textContent = `✅ #${i + 1}: Erstellt (ID: ${data.id}) — ${url.slice(0, 60)}${url.length > 60 ? '…' : ''}`;
          successCount++;
        }
      } else {
        itemDiv.className = 'dump-result-item error';
        itemDiv.textContent = `❌ #${i + 1}: ${data.error || 'Fehler'} — ${url.slice(0, 60)}${url.length > 60 ? '…' : ''}`;
        errorCount++;
      }
    } catch (err) {
      itemDiv.className = 'dump-result-item error';
      itemDiv.textContent = `❌ #${i + 1}: Netzwerkfehler — ${url.slice(0, 60)}${url.length > 60 ? '…' : ''}`;
      errorCount++;
    }
  }

  // Summary
  const total = urls.length;
  feedback.className = 'dump-feedback ' + (errorCount === 0 ? 'success' : 'error');
  feedback.textContent = errorCount === 0
    ? `✅ Alle ${total} URL(s) erfolgreich eingesendet!`
    : `⚠️ ${successCount} von ${total} URL(s) erfolgreich, ${errorCount} Fehler`;

  btn.disabled = false;
  btn.textContent = '📥 Einsenden';

  // Clear on full success
  if (errorCount === 0) {
    textarea.value = '';
    document.getElementById('dumpTitle').value = '';
  }

  // Refresh entry list
  loadEntries();
}

// Auto-refresh
let refreshInterval;
function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    const active = document.querySelector('.panel.active');
    if (active && active.id === 'panelStatus') loadStatus();
    if (active && active.id === 'panelEntries') loadEntries();
    if (active && active.id === 'panelYoutube') loadYoutubeGallery();
  }, 30000);
}

// --- Detail Modal ---
async function openDetail(entryId) {
  const modal = document.getElementById('detailModal');
  const titleEl = document.getElementById('modalTitle');
  const bodyEl = document.getElementById('modalBody');
  const footerEl = document.getElementById('modalFooter');

  titleEl.textContent = 'Lade …';
  bodyEl.innerHTML = '<div class="empty-state">⏳ Lade Details …</div>';
  footerEl.innerHTML = '';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const res = await fetch(API + '/api/entries/' + entryId);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const entry = await res.json();
    renderDetailModal(entry, titleEl, bodyEl, footerEl);
  } catch (err) {
    bodyEl.innerHTML = '<div class="empty-state" style="color:var(--red)">⚠️ Fehler: ' + err.message + '</div>';
  }
}

function closeDetail(event) {
  if (event && event.target !== event.currentTarget) return; // only close on overlay click
  const modal = document.getElementById('detailModal');
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const modal = document.getElementById('detailModal');
    if (modal.classList.contains('open')) closeDetail();
  }
});

function renderDetailModal(entry, titleEl, bodyEl, footerEl) {
  titleEl.textContent = entry.title || 'Kein Titel';

  const sourceBadge = entry.source_type
    ? `<span class="source-badge ${entry.source_type}">${entry.source_type}</span>`
    : '';
  const relevanceStars = entry.analysis && entry.analysis.relevance
    ? '⭐'.repeat(entry.analysis.relevance)
    : '';
  const analysis = entry.analysis || {};

  // Meta row
  let metaHtml = `<div class="modal-meta">${sourceBadge}`;
  if (entry.language) metaHtml += `<span style="font-size:0.75rem;padding:0.05rem 0.4rem;border-radius:3px;background:rgba(6,182,212,0.15);color:var(--cyan);text-transform:uppercase;">${entry.language}</span>`;
  if (entry.author) metaHtml += `<span style="color:var(--text-dim);font-size:0.85rem;">${entry.author}</span>`;
  if (entry.published_at) metaHtml += `<span style="color:var(--text-dim);font-size:0.85rem;">${new Date(entry.published_at).toLocaleDateString('de-DE')}</span>`;
  if (relevanceStars) metaHtml += `<span style="color:var(--orange);font-size:0.9rem;">${relevanceStars}</span>`;
  if (entry.status === 'processing') {
    const stepLabel = STEP_LABELS[entry.processing_step] || entry.processing_step;
    metaHtml += `<span class="status-badge processing">🔄 ${stepLabel}</span>`;
  } else {
    metaHtml += `<span class="status-badge ${entry.status}">${entry.status}</span>`;
  }
  metaHtml += '</div>';

  // Content
  let bodyHtml = metaHtml;

  // Full content / transcript
  if (entry.content) {
    bodyHtml += `<div class="modal-section">
      <h3>📄 Inhalt</h3>
      <div class="content-text">${escapeHtml(entry.content)}</div>
    </div>`;
  }

  // Analysis
  if (analysis.summary) {
    bodyHtml += `<div class="modal-section">
      <h3>📝 Zusammenfassung</h3>
      <div class="content-text">${escapeHtml(analysis.summary)}</div>
    </div>`;
  }

  if (analysis.topics && analysis.topics.length) {
    bodyHtml += `<div class="modal-section">
      <h3>🔍 Analyse</h3>`;
    analysis.topics.forEach(t => {
      bodyHtml += `<div class="modal-topic">
        <h4>${escapeHtml(t.name || 'Thema')}</h4>
        <p><span class="label">Was ist das?</span><br>${escapeHtml(t.what_is || '—')}</p>
        <p><span class="label">Homelab-Mehrwert</span><br>${escapeHtml(t.homelab_value || '—')}</p>
        <p><span class="label">Hermi/KI-Mehrwert</span><br>${escapeHtml(t.hermi_value || '—')}</p>
      </div>`;
    });
    bodyHtml += '</div>';
  }

  // Fallback if analysis has old format (takeaways + action_items)
  if (!analysis.topics && analysis.takeaways && analysis.takeaways.length) {
    bodyHtml += `<div class="modal-section">
      <h3>💡 Takeaways</h3>
      <ul style="list-style:disc;padding-left:1.25rem;font-size:0.9rem;line-height:1.7;">`;
    analysis.takeaways.forEach(t => {
      bodyHtml += `<li>${escapeHtml(t)}</li>`;
    });
    bodyHtml += '</ul></div>';
  }
  if (!analysis.topics && analysis.action_items && analysis.action_items.length) {
    bodyHtml += `<div class="modal-section">
      <h3>🎯 Handlungsoptionen</h3>
      <ul style="list-style:disc;padding-left:1.25rem;font-size:0.9rem;line-height:1.7;">`;
    analysis.action_items.forEach(a => {
      bodyHtml += `<li>${escapeHtml(a)}</li>`;
    });
    bodyHtml += '</ul></div>';
  }

  bodyEl.innerHTML = bodyHtml;

  // Footer: links
  let footerHtml = '';
  if (entry.url) {
    footerHtml += `<a href="${escapeHtml(entry.url)}" target="_blank" rel="noopener">🔗 Original-Link</a>`;
  }
  if (entry.obsidian_note_path) {
    footerHtml += `<a href="obsidian://open?vault=osb&file=${encodeURIComponent(entry.obsidian_note_path)}" target="_blank">📝 Obsidian-Note</a>`;
  }
  footerEl.innerHTML = footerHtml;
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Sources Tab ---
async function loadSources() {
  const container = document.getElementById('sourceList');
  document.getElementById('sourcesUpdated').textContent =
    'Zuletzt aktualisiert: ' + new Date().toLocaleTimeString('de-DE');

  try {
    const res = await fetch(API + '/api/sources');
    const sources = await res.json();
    if (!sources.length) {
      container.innerHTML = '<div class="empty-state">Keine Quellen konfiguriert. Füge oben eine hinzu.</div>';
      return;
    }
    container.innerHTML = sources.map(s => {
      const enabled = s.enabled ? '✅ Aktiv' : '⛔ Deaktiviert';
      const lastScan = s.last_scanned_at
        ? new Date(s.last_scanned_at).toLocaleString('de-DE')
        : 'Nie';
      const intervalLabel = s.interval === 'hourly' ? 'Stündlich' : s.interval === 'daily' ? 'Täglich' : s.interval;
      return `<div class="entry-card">
        <div class="meta">
          <span class="source-badge ${s.type === 'subreddit' ? 'reddit' : 'rss'}">${s.type}</span>
          <span>${escapeHtml(s.name || s.url)}</span>
        </div>
        <div style="font-size:0.85rem;margin-bottom:0.3rem;">
          <a href="${escapeHtml(s.url)}" target="_blank" rel="noopener" style="color:var(--cyan);">${escapeHtml(s.url)}</a>
        </div>
        <div class="footer">
          <div>
            <span style="color:var(--text-dim);font-size:0.8rem;">🔄 ${intervalLabel}</span>
            <span style="color:var(--text-dim);font-size:0.8rem;margin-left:1rem;">${enabled}</span>
            <span style="color:var(--text-dim);font-size:0.8rem;margin-left:1rem;">📅 Letzter Scan: ${lastScan}</span>
          </div>
          <button onclick="deleteSource(${s.id})" style="background:none;border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:0.25rem 0.6rem;border-radius:4px;cursor:pointer;font-size:0.8rem;">Löschen</button>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    container.innerHTML = '<div class="empty-state" style="color:var(--red)">⚠️ Fehler: ' + err.message + '</div>';
  }
}

async function addSource() {
  const url = document.getElementById('sourceUrl').value.trim();
  const type = document.getElementById('sourceType').value;
  const name = document.getElementById('sourceName').value.trim();
  const feedback = document.getElementById('sourceFeedback');

  if (!url) {
    feedback.className = 'dump-feedback error';
    feedback.textContent = '⚠️ Bitte gib eine URL ein.';
    return;
  }

  try {
    const res = await fetch(API + '/api/sources', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, url, name, interval: 'daily' })
    });
    const data = await res.json();
    if (res.ok) {
      feedback.className = 'dump-feedback success';
      feedback.textContent = '✅ Quelle hinzugefügt (ID: ' + (data.id || '') + ')';
      document.getElementById('sourceUrl').value = '';
      document.getElementById('sourceName').value = '';
      loadSources();
    } else {
      feedback.className = 'dump-feedback error';
      feedback.textContent = '⚠️ ' + (data.error || 'Unbekannter Fehler');
    }
  } catch (err) {
    feedback.className = 'dump-feedback error';
    feedback.textContent = '⚠️ Netzwerkfehler: ' + err.message;
  }
}

async function deleteSource(id) {
  if (!confirm('Quelle wirklich löschen?')) return;
  try {
    const res = await fetch(API + '/api/sources/' + id, { method: 'DELETE' });
    if (res.ok) {
      loadSources();
    } else {
      const data = await res.json();
      alert('Fehler: ' + (data.error || 'Unbekannt'));
    }
  } catch (err) {
    alert('Netzwerkfehler: ' + err.message);
  }
}

async function triggerScan() {
  try {
    const res = await fetch(API + '/api/scan/now', { method: 'POST' });
    const data = await res.json();
    alert(data.message || 'Scan gestartet');
    // Reload sources after a delay to show updated last_scanned_at
    setTimeout(loadSources, 5000);
  } catch (err) {
    alert('Fehler: ' + err.message);
  }
}

// Init
loadStatus();
startAutoRefresh();
